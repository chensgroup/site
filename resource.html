</head>
<body>
  <header>
    <h1>師大物理教育團隊</h1>
    <nav class="menu-zh">
      <a href="index.html">首頁</a>
      <a href="member.html">成員</a>
      <a href="research.html">研究</a>
      <a href="course.html">課程</a>
      <a href="resource.html">資源</a>
      <a href="event.html">活動</a>
      <a class="forYt" href="https://youtube.com/channel/UCCkcgVCncWmGhfgu9elQgjQ?si=ZbwjryW_BgaaabVk"
        target="_blank">YouTube</a>
      <a class="lang-option" href="index_en.html">English</a>
    </nav>
  </header>
  <main>
    <h2>好站連結</h2>
    <div class="photo-grid">
      <a class="course-button" href="https://chendaneyl.blogspot.com/" target="_blank"><strong>冒牌自然老師</strong></a>
      <a class="course-button" href="https://www2.phy.ntnu.edu.tw/" target="_blank"><strong>師大物理系</strong></a>
    </div>
    <h2>選修物理單元</h2>
    <div class="photo-grid">
      <div class="person-card dropdown-container" tabindex="0" data-name="力學一"
        data-options="量測 直線運動 平面運動 牛頓運動定律 週期性運動 萬有引力">
        <button class="course-button"><strong>力學一</strong></button>
        <div class="dropdown-content" id="dropdownList"></div>
      </div>
      <div class="person-card dropdown-container" tabindex="0" data-name="力學二、熱學"
        data-options="力平衡與力矩 質心與動量 功與能量 碰撞 熱學">
        <button class="course-button"><strong>力學二、熱學</strong></button>
        <div class="dropdown-content" id="dropdownList"></div>
      </div>
      <div class="person-card dropdown-container" tabindex="0" data-name="波動、光及聲音"
        data-options="波的性質、疊加原理 駐波、惠更斯定理 聲波的傳播、共鳴 幾何光學(反射、折射、透鏡) 物理光學(波動說、干涉、繞射)">
        <button class="course-button"><strong>波動、光及聲音</strong></button>
        <div class="dropdown-content" id="dropdownList"></div>
      </div>
      <div class="person-card dropdown-container" tabindex="0" data-name="電磁現象一"
        data-options="靜電學(庫倫定律) 電場、電位能、電位及電位差 電流磁效應、導線在磁場中受力 帶電質點在磁場中的運動、勞侖茲力 電磁感應、冷次定律">
        <button class="course-button"><strong>電磁現象一</strong></button>
        <div class="dropdown-content" id="dropdownList"></div>
      </div>
      <div class="person-card dropdown-container" tabindex="0" data-name="電磁現象二、量子現象"
        data-options="電流、電阻與歐姆定律 量子論：黑體輻射、光電效應 原子結構與原子核 氫原子光譜與能階、物質波">
        <button class="course-button"><strong>電磁現象二、量子現象</strong></button>
        <div class="dropdown-content" id="dropdownList"></div>
      </div>
    </div>
    <h2>其他資源</h2>
    <div class="photo-grid">
      <a class="course-button" href="https://www.youtube.com/watch?v=YPD-mLYH8ks"
        target="_blank"><strong>板書撰寫教學</strong></a>
      <a class="course-button" href="https://www.youtube.com/watch?v=dlJQX9mbobo"
        target="_blank"><strong>探究式教學</strong></a>
    </div>
  </main>
  <div class="modal" id="profile-modal" aria-hidden="true" role="dialog" aria-modal="true">
    <div class="modal__panel">
      <div class="modal__topbar" style="display:none;">
        <div class="name" id="m-name-mobile"></div>
        <button class="modal__close" aria-label="關閉">&times;</button>
        <div class="dropdown-content" id="dropdownList"></div>
      </div>
      <button class="modal__close" aria-label="關閉" title="關閉">&times;</button>
      <div class="modal__body">
        <h2 id="m-name"></h2>
        <div class="modal__info" id="m-info"></div>
      </div>
    </div>
  </div>
  <footer>
    <p>© 2026 師大物理教育團隊<br>聯絡我們：ntnuphyedu0101@gmail.com</p>
  </footer>
  <script src="course-resource.js"></script>
</body>
</html>
